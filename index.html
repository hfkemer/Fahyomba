<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAHYOMBA - Görev Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        
        .modern-input { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modern-input:focus { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }
        
        .page { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .task-card { border: 3px solid #111827; box-shadow: 0 10px 15px -3px rgb(17 24 39); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .navy-bg { background: linear-gradient(135deg, #001f3f 0%, #003366 100%); }
        .dark-silver-bg { background: linear-gradient(135deg, #1f2937 0%, #374151 100%); }
    </style>
</head>
<body class="bg-gray-100">

    <!-- ROL SEÇİM SAYFASI -->
    <div id="role-page" class="min-h-screen dark-silver-bg flex items-center justify-center page px-4">
        <div class="max-w-5xl mx-auto text-center w-full">
            <div class="mb-12">
                <h1 class="title-font text-6xl md:text-7xl font-bold text-white tracking-tighter mb-1">FAHYOMBA</h1>
                <p class="text-3xl md:text-4xl font-medium text-white/90">Görev Yönetim Sistemi</p>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 md:gap-8 max-w-4xl mx-auto">
                <div onclick="selectRole('admin')" class="sharp-card cursor-pointer bg-white rounded-3xl shadow-2xl p-8 md:p-10 hover:scale-105 transition-all duration-300 border-2 border-transparent hover:border-amber-500 group hero-glow">
                    <div class="flex justify-center mb-6"><i class="fa-solid fa-shield-halved text-7xl md:text-8xl text-amber-600 group-hover:rotate-12 transition-transform"></i></div>
                    <h3 class="text-3xl md:text-4xl font-semibold text-center text-gray-900 mb-3">Admin</h3>
                    <p class="text-center text-gray-500 text-base md:text-lg">Tam kontrol • Güvenli giriş</p>
                </div>
                <div onclick="selectRole('mudir')" class="sharp-card cursor-pointer bg-white rounded-3xl shadow-2xl p-8 md:p-10 hover:scale-105 transition-all duration-300 border-2 border-transparent hover:border-blue-500 group hero-glow">
                    <div class="flex justify-center mb-6"><i class="fa-solid fa-user-tie text-7xl md:text-8xl text-blue-700 group-hover:rotate-12 transition-transform"></i></div>
                    <h3 class="text-3xl md:text-4xl font-semibold text-center text-gray-900 mb-3">Müdür</h3>
                    <p class="text-center text-gray-500 text-base md:text-lg">Görev ata • Bildirim al</p>
                </div>
                <div onclick="selectRole('ogretmen')" class="sharp-card cursor-pointer bg-white rounded-3xl shadow-2xl p-8 md:p-10 hover:scale-105 transition-all duration-300 border-2 border-transparent hover:border-emerald-500 group hero-glow">
                    <div class="flex justify-center mb-6"><i class="fa-solid fa-chalkboard-teacher text-7xl md:text-8xl text-emerald-600 group-hover:rotate-12 transition-transform"></i></div>
                    <h3 class="text-3xl md:text-4xl font-semibold text-center text-gray-900 mb-3">Öğretmen</h3>
                    <p class="text-center text-gray-500 text-base md:text-lg">Görevleri gör • Fotoğrafla tamamla</p>
                </div>
            </div>
        </div>
    </div>

    <!-- KAYIT SAYFASI -->
    <div id="register-page" class="hidden min-h-screen dark-silver-bg flex items-center justify-center page px-4">
        <div class="max-w-md w-full mx-auto bg-white rounded-3xl shadow-2xl p-8 sm:p-10">
            <div class="flex items-center justify-between mb-8">
                <h2 id="register-title" class="text-3xl font-semibold text-gray-900">Kayıt Ol</h2>
                <button onclick="backToRole()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-arrow-left text-2xl"></i></button>
            </div>
            <form id="register-form" onsubmit="registerUser(event)">
                <div class="space-y-6">
                    <div id="reg-name-container">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ad Soyad</label>
                        <input type="text" id="reg-name" required class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                    </div>
                    <div>
                        <label id="reg-email-label" class="block text-sm font-medium text-gray-700 mb-1">E-posta <span class="text-xs text-gray-400">(zorunlu değil)</span></label>
                        <input type="email" id="reg-email" class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                    </div>
                    <div id="reg-password-container">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
                        <input type="password" id="reg-password" required class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-xl transition-all">Kayıt Ol</button>
                </div>
            </form>
            <p onclick="showLoginAfterRegister()" class="text-center text-sm text-gray-500 mt-6 cursor-pointer hover:text-gray-700">Zaten hesabın var mı? <span class="font-semibold text-emerald-600">Giriş yap</span></p>
        </div>
    </div>

    <!-- GİRİŞ SAYFASI -->
    <div id="login-page" class="hidden min-h-screen dark-silver-bg flex items-center justify-center page px-4">
        <div class="max-w-md w-full mx-auto bg-white rounded-3xl shadow-2xl p-8 sm:p-10">
            <div class="flex items-center justify-between mb-8">
                <h2 id="login-title" class="text-3xl font-semibold text-gray-900">Giriş Yap</h2>
                <button onclick="backToRole()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-arrow-left text-2xl"></i></button>
            </div>
            <form id="login-form" onsubmit="loginUser(event)">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ad Soyad</label>
                        <input type="text" id="login-name" required class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                    </div>
                    <div id="extra-email-field" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-1">E-posta (bildirim için)</label>
                        <input type="email" id="login-email" class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
                        <input type="password" id="login-password" autocomplete="off" onpaste="this.value = this.value.trim()" oninput="this.value = this.value.trim()" required class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                    </div>
                    <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-semibold py-4 rounded-2xl text-xl transition-all">Giriş Yap</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ANA EKRAN -->
    <div id="dashboard-page" class="hidden min-h-screen navy-bg text-white page">
        <div class="max-w-7xl mx-auto px-4 sm:px-8 py-6 sm:py-8">
            <div class="flex items-center justify-between mb-10 header-border pb-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl hero-glow">📋</div>
                    <div>
                        <h1 class="title-font text-4xl sm:text-5xl font-semibold tracking-tighter">FAHYOMBA Görev Paneli</h1>
                        <p id="user-info" class="text-white/70 text-lg sm:text-xl"></p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Profil Butonu -->
                    <button onclick="showProfileModal()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 py-3 rounded-3xl text-sm font-medium transition-all">
                        <i class="fa-solid fa-user-circle text-2xl"></i>
                        <span id="profile-name" class="hidden sm:inline"></span>
                    </button>

                    <div id="notification-bell-container" class="hidden">
                        <div onclick="toggleNotifications()" class="relative cursor-pointer flex items-center justify-center w-12 h-12 bg-white/10 hover:bg-white/20 rounded-3xl transition-all">
                            <i class="fa-solid fa-bell text-3xl"></i>
                            <span id="notification-count" class="absolute -top-1 -right-1 bg-red-500 text-xs font-bold text-white rounded-full min-w-[20px] h-[20px] flex items-center justify-center">0</span>
                        </div>
                    </div>
                    <button onclick="logout()" class="flex items-center gap-3 bg-white/10 hover:bg-white/20 px-6 sm:px-8 py-4 rounded-3xl text-sm font-medium transition-all">
                        <i class="fa-solid fa-right-from-bracket"></i> Çıkış
                    </button>
                </div>
            </div>

            <!-- Görev Ekleme (Belirli Öğretmenlere Atama Eklendi) -->
            <div id="task-form-container" class="lg:col-span-5">
                <div class="rotating-border bg-white text-gray-900 rounded-3xl p-8 task-card">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="px-6 py-3 bg-emerald-100 text-emerald-700 rounded-3xl text-sm font-semibold flex items-center"><i class="fa-solid fa-plus mr-2"></i>YENİ GÖREV</div>
                        <p id="form-user-name" class="text-xl font-medium"></p>
                    </div>
                    <form id="task-form" onsubmit="addTask(event)">
                        <textarea id="task-text" rows="3" class="w-full px-6 py-5 border-2 border-gray-900 rounded-3xl text-lg resize-none focus:outline-none" placeholder="Görev açıklamasını yaz..."></textarea>
                        
                        <!-- Belirli Öğretmenlere Atama -->
                        <div class="mt-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Bu görevi kime atayacaksın?</label>
                            <select id="task-assigned-users" multiple class="w-full px-6 py-5 border-2 border-gray-900 rounded-3xl text-lg focus:outline-none">
                                <!-- JS ile doldurulacak -->
                            </select>
                        </div>

                        <div class="mt-6 grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-gray-500 mb-2">Tarih</label>
                                <input type="date" id="task-date" required class="w-full px-6 py-5 border-2 border-gray-900 rounded-3xl text-lg focus:outline-none">
                            </div>
                            <div class="flex items-end">
                                <button type="submit" class="w-full bg-gray-900 text-white py-5 rounded-3xl text-2xl font-semibold hover:bg-black transition-all">Göreve Ekle</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Diğer kısımlar (Görev Listesi, Admin Paneli vs.) önceki kodla aynı kalıyor, sadece gerekli yerler güncellendi. -->

            <!-- Profil Modal -->
            <div id="profile-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 px-4">
                <div class="modal bg-white text-gray-900 rounded-3xl p-8 w-full max-w-md mx-auto">
                    <h3 class="text-2xl font-semibold mb-6">Profilim</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ad Soyad</label>
                            <input type="text" id="profile-name-input" class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">E-posta</label>
                            <input type="email" id="profile-email-input" class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Yeni Şifre (değiştirmek istemiyorsan boş bırak)</label>
                            <input type="password" id="profile-password-input" class="modern-input w-full px-5 py-4 bg-gray-100 border-2 border-gray-300 rounded-2xl focus:border-gray-900 text-lg outline-none">
                        </div>
                        <div class="flex gap-4">
                            <button onclick="closeProfileModal()" class="flex-1 py-4 text-gray-500 font-medium rounded-3xl border-2 border-gray-300">İptal</button>
                            <button onclick="saveProfile()" class="flex-1 py-4 bg-gray-900 text-white font-semibold rounded-3xl">Kaydet</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bildirim Paneli ve Admin Paneli önceki kodla aynı kalıyor -->

            <script>
                // ... (Önceki tüm JavaScript kodun burada kalıyor, sadece gerekli eklemeler yapıldı)

                // Görev eklerken öğretmen seçimi için
                function populateTeacherSelect() {
                    const select = document.getElementById('task-assigned-users');
                    const users = getUsers();
                    select.innerHTML = '<option value="all">Tüm Öğretmenlere</option>';
                    users.forEach(u => {
                        if (u.role === 'ogretmen') {
                            select.innerHTML += `<option value="${u.id}">${u.name}</option>`;
                        }
                    });
                }

                function addTask(e) {
                    e.preventDefault();
                    if (currentUser.role === 'ogretmen') return;
                    const text = document.getElementById('task-text').value.trim();
                    const date = document.getElementById('task-date').value;
                    const assigned = Array.from(document.getElementById('task-assigned-users').selectedOptions).map(opt => opt.value);
                    
                    if (!text || !date) return;

                    // Görev ekleme işlemi (önceki kodla aynı)
                    const tasks = getTasks();
                    tasks.unshift({ 
                        id: Date.now(), 
                        text, 
                        date, 
                        addedBy: currentUser.name, 
                        role: currentUser.role, 
                        status: null, 
                        photo: null,
                        assignedTo: assigned 
                    });
                    saveTasks(tasks);
                    document.getElementById('task-form').reset();
                    renderTaskList();
                }

                function showProfileModal() {
                    document.getElementById('profile-name-input').value = currentUser.name || '';
                    document.getElementById('profile-email-input').value = currentUser.email || '';
                    document.getElementById('profile-modal').classList.remove('hidden');
                }

                function closeProfileModal() {
                    document.getElementById('profile-modal').classList.add('hidden');
                }

                function saveProfile() {
                    const newName = document.getElementById('profile-name-input').value.trim();
                    const newEmail = document.getElementById('profile-email-input').value.trim();
                    const newPassword = document.getElementById('profile-password-input').value.trim();

                    if (newName) currentUser.name = newName;
                    if (newEmail) currentUser.email = newEmail;
                    if (newPassword) currentUser.password = newPassword;

                    saveCurrentUser(currentUser);
                    alert('✅ Profil güncellendi!');
                    closeProfileModal();
                    loadDashboard();
                }

                // Sayfa yüklendiğinde öğretmen listesini doldur
                window.onload = function() {
                    // ... önceki onload kodları ...
                    if (document.getElementById('task-assigned-users')) populateTeacherSelect();
                };
            </script>
        </div>
    </div>
</body>
</html>
